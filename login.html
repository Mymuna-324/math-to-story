<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign In | Math-to-Story</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --accent: #38bdf8;
    --accent-dim: #0ea5c7;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --danger: #f87171;
    --radius: 1rem;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 20%, rgba(56, 189, 248, 0.08), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(129, 140, 248, 0.08), transparent 40%);
    color: var(--text);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }

  .login-card {
    width: 100%;
    max-width: 380px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2.25rem 2rem;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 1.75rem;
  }

  .logo-mark {
    width: 2.5rem;
    height: 2.5rem;
    border-radius: 0.65rem;
    background: linear-gradient(135deg, var(--accent), #818cf8);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
  }

  .logo-text {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text);
  }

  h1 {
    font-size: 1.35rem;
    font-weight: 800;
    margin: 0 0 0.35rem;
    color: var(--text);
  }

  .subtitle {
    font-size: 0.875rem;
    color: var(--text-dim);
    margin: 0 0 1.75rem;
  }

  form { display: flex; flex-direction: column; gap: 1.1rem; }

  .field label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 0.4rem;
  }

  .field input {
    width: 100%;
    background: #0f172a;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 0.9rem;
    padding: 0.7rem 0.85rem;
    border-radius: 0.6rem;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }

  .field input::placeholder { color: #475569; }

  .field input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
  }

  .field input.invalid {
    border-color: var(--danger);
  }

  .field-error {
    font-size: 0.78rem;
    color: var(--danger);
    margin-top: 0.35rem;
    min-height: 1em;
  }

  .btn-submit {
    margin-top: 0.4rem;
    background: var(--accent);
    color: #0f172a;
    font-weight: 700;
    font-size: 0.925rem;
    border: none;
    padding: 0.75rem 1rem;
    border-radius: 0.65rem;
    cursor: pointer;
    transition: opacity 0.15s ease, transform 0.1s ease;
  }

  .btn-submit:hover { opacity: 0.9; }
  .btn-submit:active { transform: scale(0.98); }

  .hint {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.78rem;
    color: #475569;
  }
</style>
</head>
<body>

  <div class="login-card">
    <div class="logo">
      <div class="logo-mark">📐</div>
      <div class="logo-text">Math<span style="color:var(--accent)">-to-</span>Story</div>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to pick up where you left off.</p>

    <form id="login-form" novalidate>
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="e.g. Maisha" autocomplete="username" />
        <p class="field-error" id="username-error"></p>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
        <p class="field-error" id="email-error"></p>
      </div>

      <button type="submit" class="btn-submit">Sign In →</button>
    </form>

    <p class="hint">Demo login — no password needed. Your name and email are just stored locally in this browser.</p>
  </div>

  <script>
  /* =========================================================
     MATH-TO-STORY — DEMO LOGIN
     No real auth/backend here: this just validates the form,
     saves the username + email to localStorage, and redirects
     to dashboard.html, which reads them back on load.
  ========================================================= */

  const form = document.getElementById("login-form");
  const usernameInput = document.getElementById("username");
  const emailInput = document.getElementById("email");
  const usernameError = document.getElementById("username-error");
  const emailError = document.getElementById("email-error");

  function isValidEmail(value) {
    // Simple, good-enough client-side check (not exhaustive RFC validation)
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
  }

  form.addEventListener("submit", (e) => {
    e.preventDefault();

    usernameError.textContent = "";
    emailError.textContent = "";
    usernameInput.classList.remove("invalid");
    emailInput.classList.remove("invalid");

    const username = usernameInput.value.trim();
    const email = emailInput.value.trim();
    let hasError = false;

    if (!username) {
      usernameError.textContent = "Please enter a username.";
      usernameInput.classList.add("invalid");
      hasError = true;
    }

    if (!email || !isValidEmail(email)) {
      emailError.textContent = "Please enter a valid email address.";
      emailInput.classList.add("invalid");
      hasError = true;
    }

    if (hasError) return;

    try {
      localStorage.setItem("mathToStory.username", username);
      localStorage.setItem("mathToStory.email", email);
    } catch (err) {
      console.warn("Could not save login info to localStorage:", err);
    }

    window.location.href = "dashboard.html";
  });
  </script>

</body>
</html>
